name: 每日新闻自动推送

on:
  schedule:
    - cron: '0 0 * * *'  # 每天早8点
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python news.py
